services:
  postgres:
    image: postgres:16-alpine
    container_name: chat_ia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chat_ia
      POSTGRES_USER: chat_ia
      POSTGRES_PASSWORD: chat_ia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
